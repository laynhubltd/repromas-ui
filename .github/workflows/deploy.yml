name: Build and Deploy React/Vite to CloudPanel

on:
  push:
    branches:
      - main # Triggers automatically when you push to the 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the latest code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js on GitHub's servers
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Step 3: Install dependencies and build the Vite app
      - name: Install and Build
        run: |
          npm ci
          npm run build

      # Step 4: Rsync the finished 'dist' folder directly to CloudPanel
      - name: Deploy to CloudPanel via SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rltgoDzvO --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: "/home/repromas-ui/htdocs/repromas.app/"
